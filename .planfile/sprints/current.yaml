sprint:
  id: current
  name: Two starter tickets generated by `koru --init`. Replace them with
  status: active
  tickets:
    STARTER-001:
      id: STARTER-001
      name: Confirm koru is wired correctly
      description: "Verify the koru \u2194 planfile \u2194 LLM loop end-to-end on\
        \ this project.\n\n1. Run `koru` (no args) and read the markdown brief.\n\
        2. Confirm the policy table shows all gates as `False`.\n3. Confirm `STARTER-001`\
        \ is the active ticket.\n4. Run `planfile ticket done STARTER-001`.\n"
      executor:
        kind: shell
        handler: echo "koru is wired"
        mode: automatic
      execution:
        queue: default
        state: ready
        attempt: 0
        max_attempts: 1
      priority: high
      sprint: current
      status: open
    STARTER-002:
      id: STARTER-002
      name: Replace starter tickets with your real backlog
      description: 'Edit `.planfile/sprints/current.yaml` and add the work that

        actually matters for this project. You can also re-run

        `koru --init --force --from your-pipeline.yaml` to import a

        flat pipeline you already maintain elsewhere.

        '
      executor:
        kind: human
        mode: interactive
      execution:
        queue: default
        state: ready
        attempt: 0
        max_attempts: 1
      priority: normal
      blocked_by:
      - STARTER-001
      sprint: current
      status: open
